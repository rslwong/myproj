<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PhoneConf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Landing ── -->
  <div id="landing-screen" class="screen active">
    <div class="landing-hero">
      <div class="app-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#2563eb"/>
          <path d="M15 18c0-1.1.9-2 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H17a2 2 0 0 1-2-2V18z" fill="white" opacity=".3"/>
          <path d="M19 22a5 5 0 0 1 10 0M22 26a2 2 0 1 0 4 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="24" cy="26" r="1" fill="white"/>
        </svg>
      </div>
      <h1>PhoneConf</h1>
      <p>Crystal-clear voice calls, no account needed</p>
    </div>

    <div class="landing-card">
      <button id="create-btn" class="btn btn-primary">
        <svg class="btn-ico" viewBox="0 0 20 20" fill="currentColor"><path d="M10 5a1 1 0 0 1 1 1v3h3a1 1 0 1 1 0 2h-3v3a1 1 0 1 1-2 0v-3H6a1 1 0 1 1 0-2h3V6a1 1 0 0 1 1-1z"/></svg>
        Create Room
      </button>

      <div class="or-divider"><span>or join with a code</span></div>

      <div class="join-row">
        <input id="room-code-input" class="room-input" type="text"
               placeholder="XXXXXX" maxlength="6" autocomplete="off"
               autocapitalize="characters" spellcheck="false">
        <button id="join-btn" class="btn btn-secondary">Join</button>
      </div>
      <p id="join-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- ── Call ── -->
  <div id="call-screen" class="screen">
    <div class="call-header">
      <div class="room-badge">
        <span class="room-label">Room</span>
        <span id="room-code-display" class="room-code-text"></span>
        <button id="copy-btn" class="icon-btn" title="Copy code">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 2a2 2 0 0 0-2 2v1H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7l-4-4H8zm4 1.5L14.5 6H13a1 1 0 0 1-1-1V3.5zM6 5h1v1a3 3 0 0 0 3 3h3v7H6V5z"/></svg>
        </button>
      </div>
      <div id="call-timer" class="call-timer">00:00</div>
      <div class="connection-badge" id="conn-badge">
        <span class="dot"></span><span>Live</span>
      </div>
    </div>

    <div class="participants-section">
      <div class="section-title">Participants <span id="participant-count" class="count-badge">1</span></div>
      <div id="participants-list" class="participants-list"></div>
    </div>

    <div class="call-controls">
      <div class="control-group">
        <button id="mute-btn" class="ctrl-btn" data-active="false">
          <span class="ctrl-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
            </svg>
          </span>
          <span class="ctrl-label">Mute</span>
        </button>

        <button id="leave-btn" class="ctrl-btn end-btn">
          <span class="ctrl-ico">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
              <line x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2"/>
            </svg>
          </span>
          <span class="ctrl-label">End</span>
        </button>

        <button id="speaker-btn" class="ctrl-btn" data-active="true">
          <span class="ctrl-ico" id="speaker-ico">
            <!-- Speaker icon (default) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </span>
          <span class="ctrl-label" id="speaker-label">Speaker</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
